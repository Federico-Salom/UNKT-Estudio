name: Deploy to Droplet

on:
  push:
    branches: ["master"]

concurrency:
  group: unkt-estudio-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e
            cd /var/www/unkt-estudio

            git fetch --all --prune
            git reset --hard origin/master

            export DATABASE_URL="file:/var/www/unkt-estudio/prisma/dev.db"

            npm ci

            npx prisma migrate deploy

            npx prisma generate
            npm run build  
            sudo -n /usr/bin/systemctl restart unkt-estudio
